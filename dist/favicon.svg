<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Binary A Website Icon</title>
  <desc id="desc">A dark website icon with a green letter A made from binary zeroes and ones.</desc>

  <rect width="1024" height="1024" rx="160" fill="#07090F"/>

  <defs>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .bit {
        fill: #00E87A;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-weight: 900;
        dominant-baseline: middle;
        text-anchor: middle;
      }
      .main { font-size: 54px; letter-spacing: 4px; filter: url(#softGlow); }
      .side { font-size: 44px; opacity: .95; filter: url(#softGlow); }
      .small { font-size: 30px; opacity: .9; filter: url(#softGlow); }
      .tiny { font-size: 24px; opacity: .82; }
    </style>
  </defs>

  <!-- Binary A shape -->
  <g id="binary-a">
    <!-- top peak -->
    <text class="bit main" x="512" y="170">1</text>
    <text class="bit main" x="512" y="245">1001</text>
    <text class="bit main" x="512" y="290">11010</text>
    <text class="bit main" x="512" y="335">00110</text>
    <text class="bit main" x="512" y="380">001100</text>

    <!-- left diagonal -->
    <text class="bit main" x="445" y="430">010</text>
    <text class="bit main" x="420" y="475">010</text>
    <text class="bit main" x="395" y="520">010</text>
    <text class="bit main" x="370" y="565">011</text>
    <text class="bit main" x="345" y="610">1110</text>
    <text class="bit main" x="325" y="655">010</text>
    <text class="bit main" x="305" y="700">0101</text>
    <text class="bit main" x="290" y="745">0100</text>
    <text class="bit main" x="278" y="790">1110</text>
    <text class="bit main" x="266" y="835">1010</text>
    <text class="bit main" x="255" y="880">0010</text>

    <!-- right diagonal -->
    <text class="bit main" x="582" y="430">011</text>
    <text class="bit main" x="610" y="475">010</text>
    <text class="bit main" x="630" y="520">011</text>
    <text class="bit main" x="650" y="565">0111</text>
    <text class="bit main" x="675" y="610">000</text>
    <text class="bit main" x="700" y="655">1010</text>
    <text class="bit main" x="715" y="700">0010</text>
    <text class="bit main" x="730" y="745">0110</text>
    <text class="bit main" x="745" y="790">0110</text>
    <text class="bit main" x="760" y="835">0110</text>
    <text class="bit main" x="775" y="880">10010</text>

    <!-- crossbar -->
    <text class="bit main" x="512" y="650">100111101</text>
    <text class="bit main" x="512" y="700">010010100010</text>
  </g>

  <!-- Floating binary particles -->
  <g id="binary-particles">
    <text class="bit small" x="380" y="200">0</text>
    <text class="bit small" x="645" y="190">1</text>
    <text class="bit side" x="275" y="270">0</text>
    <text class="bit side" x="760" y="265">0</text>
    <text class="bit small" x="350" y="285">1</text>
    <text class="bit small" x="685" y="285">1</text>
    <text class="bit small" x="180" y="365">1</text>
    <text class="bit small" x="845" y="365">1</text>
    <text class="bit side" x="300" y="380">1</text>
    <text class="bit small" x="735" y="380">0</text>
    <text class="bit side" x="230" y="455">1</text>
    <text class="bit side" x="800" y="455">1</text>
    <text class="bit small" x="145" y="500">0</text>
    <text class="bit small" x="890" y="500">0</text>
    <text class="bit small" x="310" y="540">1</text>
    <text class="bit small" x="750" y="540">1</text>
    <text class="bit side" x="220" y="600">0</text>
    <text class="bit side" x="815" y="600">0</text>
    <text class="bit small" x="120" y="650">1</text>
    <text class="bit small" x="910" y="650">1</text>
    <text class="bit small" x="215" y="700">1</text>
    <text class="bit small" x="825" y="700">1</text>
    <text class="bit small" x="155" y="775">0</text>
    <text class="bit small" x="875" y="775">0</text>
    <text class="bit side" x="410" y="885">0</text>
    <text class="bit side" x="630" y="885">0</text>
    <text class="bit small" x="510" y="930">1</text>
    <text class="bit tiny" x="455" y="820">1</text>
    <text class="bit tiny" x="585" y="820">1</text>
    <text class="bit tiny" x="320" y="930">0</text>
    <text class="bit tiny" x="735" y="930">1</text>
  </g>
</svg>
